<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fa;--card:#ffffff;--text:#212529;--text2:#6c757d;--primary:#4dabf7;--primary-dark:#339af0;--success:#51cf66;--success-bg:#e6fcf5;--error:#ff6b6b;--error-bg:#fff5f5;--warn:#ffd43b;--border:#dee2e6;--shadow:0 2px 8px rgba(0,0,0,0.08);--radius:10px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{display:flex;max-width:1200px;margin:0 auto;min-height:100vh}
.sidebar{width:260px;background:var(--card);border-right:1px solid var(--border);padding:20px;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:var(--shadow);z-index:10}
.sidebar h1{font-size:1.1rem;margin-bottom:4px;color:var(--primary-dark)}
.sidebar .subtitle{font-size:0.7rem;color:var(--text2);margin-bottom:14px}
.sidebar h2{font-size:0.8rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:16px 0 6px}
.sidebar a{display:block;padding:7px 12px;border-radius:6px;color:var(--text);text-decoration:none;font-size:0.88rem;margin-bottom:2px;transition:all .15s;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:var(--primary);color:#fff}
.gram-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:6px;font-size:0.88rem;margin-bottom:2px;color:var(--text);transition:all .15s}
.gram-toggle:hover{background:var(--primary);color:#fff}
.gram-toggle .arr{font-size:0.7rem;transition:transform .2s;display:inline-block}
.gram-toggle.open .arr{transform:rotate(90deg)}
.gram-sub{max-height:0;overflow:hidden;transition:max-height .3s;margin-left:12px}
.gram-sub.open{max-height:800px}
.gram-sub a{font-size:0.8rem;padding:5px 12px}
.main{flex:1;padding:30px 40px;max-width:900px}
.section{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.section h2{font-size:1.15rem;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--primary);display:inline-block}

/* Song selector grid */
.song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:16px 0}
.song-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;position:relative}
.song-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.song-card.active{border-color:var(--primary);background:#e7f5ff}
.song-card .level-badge{position:absolute;top:8px;right:8px;font-size:0.65rem;padding:2px 6px;border-radius:4px;font-weight:600}
.level-a1{background:#d3f9d8;color:#2b8a3e}
.level-a2{background:#e7f5ff;color:#1971c2}
.level-b1{background:#fff3bf;color:#e67700}
.level-b2{background:#fcc2d7;color:#c2255c}
.song-card h4{font-size:0.9rem;color:var(--primary-dark);margin-bottom:2px;padding-right:40px}
.song-card .artist{font-size:0.75rem;color:var(--text2);margin-bottom:4px}
.song-card .grammar-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.song-card .grammar-tags span{font-size:0.6rem;padding:1px 5px;border-radius:3px;background:#dee2e6;color:var(--text2)}

/* Player area */
.player-wrap{position:relative;width:100%;padding-bottom:56.25%;margin-bottom:16px;border-radius:8px;overflow:hidden;background:#000}
.player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.song-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.song-info h3{font-size:1.2rem;color:var(--primary-dark)}
.song-info .artist{font-size:0.9rem;color:var(--text2)}
.song-info .level-badge{font-size:0.75rem;padding:3px 10px;border-radius:5px;font-weight:600}

/* Lyrics */
.lyrics-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;margin:12px 0;font-size:0.92rem;line-height:1.9;max-height:500px;overflow-y:auto}
.lyrics-box .en{color:var(--text)}
.lyrics-box .es{color:var(--text2);font-size:0.85rem;font-style:italic;display:none;margin-bottom:2px}
.lyrics-box .en.highlight{color:var(--primary-dark);font-weight:600}
.lyrics-box .line-group{margin-bottom:10px}
.lyrics-box .line-group .en{display:block}
.lyrics-box.show-translation .es{display:block}
.lyrics-box .chunk{font-weight:600;color:var(--text2);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px}

/* Controls */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.btn-sm{display:inline-flex;align-items:center;gap:4px;border:none;padding:6px 14px;border-radius:6px;font-size:0.82rem;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#dee2e6;color:var(--text)}.btn-secondary:hover{background:#ced4da}
.btn-success{background:var(--success);color:#fff}.btn-success.active{background:#2f9e44}

/* Exercise section */
.exercise-area{margin-top:20px}
.exercise-area textarea{width:100%;min-height:100px;border:2px solid var(--border);border-radius:8px;padding:10px;font-size:0.9rem;font-family:inherit;resize:vertical;margin:8px 0}
.exercise-area textarea:focus{outline:none;border-color:var(--primary)}
@media(max-width:700px){.container{flex-direction:column}.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}.main{padding:16px}.song-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>

// ==================== NAVIGATION ====================
let currentSong = null;
let showTranslation = false;

function buildSidebar() {
  const list = document.getElementById('song-sidebar-list');
  if (!list) return;
  list.innerHTML = '';
  SONGS.forEach(s => {
    const a = document.createElement('a');
    a.textContent = '\ud83c\udfb5 ' + s.title;
    a.onclick = () => showSong(s.id);
    a.id = 'ns-' + s.id;
    list.appendChild(a);
  });
}

function buildGrid() {
  const grid = document.getElementById('song-grid');
  grid.innerHTML = '';
  SONGS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.onclick = () => showSong(s.id);
    card.innerHTML = `
      <span class="level-badge level-${s.level.toLowerCase()}">${s.level}</span>
      <h4>${s.title}</h4>
      <div class="artist">${s.artist} \u00b7 ${s.year}</div>
      <div class="grammar-tags">${s.grammar.map(g => '<span>' + g + '</span>').join('')}</div>
    `;
    grid.appendChild(card);
  });
}

function showSong(songId) {
  const song = SONGS.find(s => s.id === songId);
  if (!song) return;
  currentSong = song;
  showTranslation = false;
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const navItem = document.getElementById('ns-' + songId);
  if (navItem) navItem.classList.add('active');

  document.getElementById('songs-home').style.display = 'none';
  document.getElementById('song-player').style.display = 'block';

  const container = document.getElementById('song-content');
  container.innerHTML = `
    <div class="song-info">
      <div>
        <h3>${song.title}</h3>
        <div class="artist">${song.artist} \u00b7 ${song.year}</div>
        <p style="color:var(--text2);font-size:0.85rem;margin-top:6px">${song.description}</p>
      </div>
      <span class="level-badge level-${song.level.toLowerCase()}" style="font-size:0.85rem;padding:4px 12px">${song.level}</span>
    </div>
    <div class="player-wrap">
      <iframe src="https://www.youtube-nocookie.com/embed/${song.youtube}?rel=0&autoplay=0" 
              allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="toolbar">
      <button class="btn-sm btn-primary" onclick="toggleTranslation()" id="btn-translate">\ud83c\uddea\ud83c\uddf8 Show translation</button>
      <button class="btn-sm btn-secondary" onclick="scrollLyrics()">\ud83d\udcdc Scroll to lyrics</button>
      <span style="margin-left:auto;font-size:0.75rem;color:var(--text2)">\ud83c\udfa4 Grammar focus: ${song.grammar.join(' \u00b7 ')}</span>
    </div>
    <h3 style="margin-top:20px">\ud83d\udcdd Lyrics</h3>
    <div class="lyrics-box" id="lyrics-box">
      ${renderLyrics(song.lyrics)}
    </div>
    <div class="exercise-area">
      <h3>\u270d\ufe0f Practice</h3>
      <p style="color:var(--text2);font-size:0.85rem;margin-bottom:6px">What do you think this song is about? Write a short paragraph in English (30-50 words).</p>
      <textarea id="song-exercise" placeholder="Write your thoughts about the song in English..."></textarea>
      <button class="btn-sm btn-primary" onclick="checkSongExercise()">\ud83d\udcdd Check words</button>
      <span id="song-exercise-feedback" style="margin-left:8px;font-size:0.85rem;color:var(--text2)"></span>
    </div>
  `;
}

function renderLyrics(lyrics) {
  return lyrics.map(line => {
    if (line.chunk) {
      return `<div class="chunk">${line.chunk}</div>`;
    }
    if (line.gap) {
      return `<div style="height:8px"></div>`;
    }
    const esLine = line.es ? `<div class="es">${line.es}</div>` : '';
    return `<div class="line-group">${esLine}<div class="en">${line.en}</div></div>`;
  }).join('');
}

function toggleTranslation() {
  showTranslation = !showTranslation;
  const box = document.getElementById('lyrics-box');
  if (box) box.classList.toggle('show-translation', showTranslation);
  const btn = document.getElementById('btn-translate');
  if (btn) btn.textContent = showTranslation ? '\ud83c\uddea\ud83c\uddf8 Hide translation' : '\ud83c\uddea\ud83c\uddf8 Show translation';
}

function scrollLyrics() {
  const box = document.getElementById('lyrics-box');
  if (box) box.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function checkSongExercise() {
  const textarea = document.getElementById('song-exercise');
  const feedback = document.getElementById('song-exercise-feedback');
  const text = textarea.value.trim();
  const words = text ? text.split(/\s+/) : [];
  if (words.length < 20) {
    feedback.textContent = '\u270f\ufe0f Try to write at least 20 words. You wrote ' + words.length + '.';
    feedback.style.color = '#e03131';
  } else {
    feedback.textContent = '\u2705 Good! You wrote ' + words.length + ' words. Keep practicing!';
    feedback.style.color = '#2b8a3e';
  }
}

// ==================== INIT ====================
buildSidebar();
buildGrid();

const hash = window.location.hash.slice(1);
if (hash && SONGS.some(s => s.id === hash)) {
  showSong(hash);
}
</script>
