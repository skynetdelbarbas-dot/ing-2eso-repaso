<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor — Admin</title>
<style>
  :root {
    --bg: #1a1b23;
    --card: #23252e;
    --card-hover: #2a2d37;
    --border: #2e303a;
    --text: #e4e5ea;
    --text-dim: #8b8d9a;
    --accent: #4dabf7;
    --accent-dim: #3a7bb5;
    --green: #51cf66;
    --yellow: #fcc419;
    --orange: #ff922b;
    --red: #ff6b6b;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Login Screen ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-box h1 { font-size: 1.5rem; margin-bottom: 6px; }
  .login-box p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    margin-bottom: 12px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .login-box button:hover { background: var(--accent-dim); }
  .login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }

  /* ── Dashboard ── */
  #dashboard { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .dash-header h1 { font-size: 1.5rem; }
  .dash-header .subtitle { color: var(--text-dim); font-size: 0.85rem; }
  .dash-header .logout-btn {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all .2s;
  }
  .dash-header .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* Stats Cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
  .stat-card .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
  .stat-card .stat-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

  /* Level Breakdown */
  .level-breakdown { margin-bottom: 24px; }
  .level-breakdown h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .level-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
  .level-bar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background .15s;
    position: relative;
  }
  .level-bar-item:hover { background: rgba(255,255,255,0.04); }
  .level-bar-item.active { background: rgba(255,255,255,0.08); }
  .level-bar-item .level-tag {
    width: 32px;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .level-bar-item .level-bar-bg {
    flex: 1;
    height: 24px;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
  }
  .level-bar-item .level-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width .5s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
    min-width: fit-content;
  }
  .level-bar-item .level-info {
    width: 100px;
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .level-bar-item .level-check {
    position: absolute;
    right: -6px;
    top: -4px;
    font-size: 0.7rem;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .level-bar-item.active .level-check { display: flex; }

  /* Section headers with filter tags */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 24px 0 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .section-header h2 { font-size: 1.1rem; }
  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(77,171,247,0.15);
    color: var(--accent);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-tag:hover { background: rgba(77,171,247,0.25); }
  .filter-tag .clear-x { margin-left: 2px; font-size: 0.85rem; }

  /* Student cards */
  .student-grid {
    display: grid;
    gap: 12px;
  }
  .student-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .student-card:hover { background: var(--card-hover); }
  .student-card.active-filter {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .student-card .student-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .student-card .student-name { font-weight: 600; font-size: 1rem; }
  .student-card .student-level {
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .student-card .student-stats {
    display: flex;
    gap: 20px;
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .student-card .student-stats span { display: flex; align-items: center; gap: 4px; }
  .student-card .view-msgs {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.75rem;
    color: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }
  .student-card:hover .view-msgs { opacity: 1; }
  .student-card.active-filter .view-msgs { opacity: 1; }

  /* Student detail expanded */
  .student-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .student-detail.open { display: block; }
  .session-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.8rem;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .session-row:last-child { border: none; }

  /* Messages */
  .msg-list { }
  .msg-item {
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.85rem;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg-item .msg-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .msg-item .msg-content { line-height: 1.5; max-height: 60px; overflow: hidden; position: relative; }
  .msg-item .msg-content.expanded { max-height: none; }
  .msg-item .msg-expand {
    color: var(--accent);
    cursor: pointer;
    font-size: 0.75rem;
    margin-top: 2px;
    display: inline-block;
  }
  .msg-item.user-msg { border-left: 3px solid var(--accent); }
  .msg-item.assistant-msg { border-left: 3px solid var(--green); }
  .msg-empty {
    color: var(--text-dim);
    padding: 24px;
    text-align: center;
    font-size: 0.9rem;
  }
  .msg-count {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* Loading */
  .loading-spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    color: var(--text-dim);
  }
  .loading-spinner::after {
    content: '';
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-left: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 600px) {
    #dashboard { padding: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .level-bar-item .level-info { width: 70px; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Tutor Admin</h1>
    <p>Enter the admin password to view usage reports.</p>
    <input type="password" id="admin-password" placeholder="Password" autocomplete="off">
    <button id="login-btn" onclick="handleLogin()">Login</button>
    <div class="login-error" id="login-error">Incorrect password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <div>
      <h1>📊 English Tutor — Admin</h1>
      <div class="subtitle" id="last-refresh"></div>
    </div>
    <button class="logout-btn" onclick="logout()">✕ Logout</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-cards"></div>

  <!-- Level breakdown -->
  <div class="level-breakdown" id="level-section"></div>

  <!-- Students -->
  <div class="section-header">
    <h2>👥 Students</h2>
    <span style="font-size:0.8rem;color:var(--text-dim)" id="student-count"></span>
  </div>
  <div class="student-grid" id="student-list"></div>

  <!-- Conversations -->
  <div class="section-header" id="conv-header">
    <h2>💬 Conversations</h2>
    <div id="conv-filters"></div>
  </div>
  <div id="conv-count" class="msg-count"></div>
  <div id="conv-list" class="msg-list"></div>
</div>

<script>
var STORAGE_KEY = 'tutor_admin_token';
var PWD_KEY = 'tutor_admin_pwd';

// ── Filter state ──
var dashboardData = null;        // full data from login
var activeLevel = null;          // string: 'A1', 'A2', etc. or null
var activeStudentId = null;      // number or null
var studentMessagesCache = {};   // { studentId: [messages] }

// ── Startup ──
(function() {
  var token = sessionStorage.getItem(STORAGE_KEY);
  if (token === '1') {
    var pwd = sessionStorage.getItem(PWD_KEY);
    if (pwd) {
      restoreSession(pwd);
    } else {
      // No password stored, go to login
      sessionStorage.removeItem(STORAGE_KEY);
    }
  }
})();

function restoreSession(pwd) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('session_expired');
    return r.json();
  })
  .then(function(data) {
    dashboardData = data;
    renderDashboard();
  })
  .catch(function() {
    sessionStorage.removeItem(STORAGE_KEY);
    sessionStorage.removeItem(PWD_KEY);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  });
}

// ── Login ──
function handleLogin() {
  var pwd = document.getElementById('admin-password').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');

  if (!pwd) return;
  btn.disabled = true;
  btn.textContent = 'Checking...';
  err.style.display = 'none';

  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  })
  .then(function(r) {
    if (!r.ok) {
      if (r.status === 401) throw new Error('bad_password');
      if (r.status === 503) throw new Error('not_configured');
      throw new Error('server_error');
    }
    return r.json();
  })
  .then(function(data) {
    sessionStorage.setItem(STORAGE_KEY, '1');
    sessionStorage.setItem(PWD_KEY, pwd);
    dashboardData = data;
    document.getElementById('login-screen').style.display = 'none';
    renderDashboard();
  })
  .catch(function(e) {
    if (e.message === 'bad_password') err.textContent = '❌ Incorrect password';
    else if (e.message === 'not_configured') err.textContent = '❌ Admin not configured';
    else err.textContent = '❌ Server error. Try again.';
    err.style.display = 'block';
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = 'Login';
  });
}

function logout() {
  sessionStorage.removeItem(STORAGE_KEY);
  sessionStorage.removeItem(PWD_KEY);
  dashboardData = null;
  activeLevel = null;
  activeStudentId = null;
  studentMessagesCache = {};
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-password').value = '';
}

// ── Filter helpers ──
function getFilteredData() {
  if (!dashboardData) return null;

  var students = dashboardData.students;
  var messages = dashboardData.recent_messages;

  // Filter by level
  if (activeLevel) {
    students = students.filter(function(s) { return s.level === activeLevel; });
    // For messages, get student IDs of filtered students
    var levelStudentIds = {};
    students.forEach(function(s) { levelStudentIds[s.id] = true; });
    messages = messages.filter(function(m) { return levelStudentIds[m.student_id] !== undefined; });
  }

  // Filter by student (overrides level filter on student level)
  if (activeStudentId) {
    students = students.filter(function(s) { return s.id === activeStudentId; });

    // Use cached full history if available
    var cached = studentMessagesCache[activeStudentId];
    if (cached) {
      messages = cached;
    } else {
      messages = messages.filter(function(m) { return m.student_id === activeStudentId; });
    }
  }

  return { students: students, messages: messages };
}

function clearFilters() {
  activeLevel = null;
  activeStudentId = null;
  renderDashboard();
}

function setLevelFilter(level) {
  if (activeLevel === level) {
    activeLevel = null;  // toggle off
  } else {
    activeLevel = level;
    activeStudentId = null;  // clear student filter when changing level
  }
  renderDashboard();
}

function setStudentFilter(studentId) {
  if (activeStudentId === studentId) {
    activeStudentId = null;  // toggle off
  } else {
    activeStudentId = studentId;
    activeLevel = null;  // clear level filter when selecting student

    // Fetch full history if not cached
    if (!studentMessagesCache[studentId]) {
      fetchStudentMessages(studentId);
    }
  }
  renderDashboard();
}

function fetchStudentMessages(studentId) {
  var pwd = sessionStorage.getItem(PWD_KEY);
  if (!pwd) return;

  fetch('/api/admin/student-messages?student_id=' + studentId + '&password=' + encodeURIComponent(pwd))
    .then(function(r) {
      if (!r.ok) throw new Error('fetch_failed');
      return r.json();
    })
    .then(function(data) {
      studentMessagesCache[studentId] = data.messages || [];
      // Only re-render if this student is still selected
      if (activeStudentId === studentId) {
        renderDashboard();
      }
    })
    .catch(function() {
      // Silently fail, will use recent_messages as fallback
    });
}

// ── Render ──
function renderDashboard() {
  var data = dashboardData;
  if (!data) return;

  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('login-screen').style.display = 'none';

  var now = new Date();
  document.getElementById('last-refresh').textContent =
    'Last updated: ' + now.toLocaleString('es-ES');

  // ── Stats cards ──
  var filtered = getFilteredData();
  var totalStudents = filtered ? filtered.students.length : data.total_students;
  var totalMsgs = filtered ? filtered.messages.length : data.total_messages;

  document.getElementById('stats-cards').innerHTML = [
    { label: 'Students', value: data.total_students, sub: 'total registered' + (activeLevel || activeStudentId ? ' · ' + totalStudents + ' shown' : '') },
    { label: 'Sessions', value: data.total_sessions, sub: 'conversation sessions' },
    { label: 'Messages', value: data.total_messages, sub: 'total exchanged' + (activeLevel || activeStudentId ? ' · ' + totalMsgs + ' shown' : '') },
    { label: 'Avg / Student', value: data.total_students ? Math.round(data.total_messages / data.total_students) : 0, sub: 'messages per student' },
  ].map(function(s) {
    return '<div class="stat-card"><div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div><div class="stat-sub">' + s.sub + '</div></div>';
  }).join('');

  // ── Level breakdown (clickable) ──
  var levels = data.by_level || {};
  var maxMsgs = Math.max(1, Object.keys(levels).length ? Math.max.apply(null, Object.values(levels).map(function(l) { return l.messages; })) : 1);
  var levelColors = { A1: '#51cf66', A2: '#74c0fc', B1: '#fcc419', B2: '#ff922b', C1: '#ff6b6b' };
  var levelNames = { A1: 'Beginner', A2: 'Elementary', B1: 'Intermediate', B2: 'Upper Int.', C1: 'Advanced' };

  var levelHtml = Object.keys(levels).sort().map(function(lvl) {
    var info = levels[lvl];
    var pct = Math.max(10, (info.messages / maxMsgs) * 100);
    var color = levelColors[lvl] || '#4dabf7';
    var isActive = activeLevel === lvl;
    return '<div class="level-bar-item' + (isActive ? ' active' : '') + '" onclick="setLevelFilter(\'' + lvl + '\')">' +
      '<span class="level-tag" style="color:' + color + '">' + lvl + '</span>' +
      '<div class="level-bar-bg"><div class="level-bar-fill" style="width:' + pct + '%;background:' + color + '">' + info.messages + ' msgs</div></div>' +
      '<span class="level-info">' + info.students + ' <span style="font-size:0.7rem">students</span></span>' +
      '<span class="level-check">✓</span>' +
      '</div>';
  }).join('');

  document.getElementById('level-section').innerHTML =
    '<h2>📈 By Level' + (activeLevel ? ' <span style="font-size:0.8rem;color:var(--accent);cursor:pointer" onclick="clearFilters()">(clear filter ✕)</span>' : '') + '</h2><div class="level-bar-wrap">' +
    (levelHtml || '<div style="color:var(--text-dim);font-size:0.85rem;padding:12px">No data yet</div>') +
    '</div>';

  // ── Students ──
  var studentsToShow = filtered ? filtered.students : data.students;
  document.getElementById('student-count').textContent = studentsToShow.length + ' of ' + data.students.length + ' total' + (activeLevel || activeStudentId ? '' : '');

  var studentsHtml = studentsToShow.map(function(s) {
    var color = levelColors[s.level] || '#4dabf7';
    var lastActive = s.last_active ? new Date(s.last_active + ' UTC').toLocaleString('es-ES') : '—';
    var isActive = activeStudentId === s.id;

    var sessionDetails = (s.sessions || []).map(function(sess) {
      var start = new Date(sess.started_at + ' UTC').toLocaleString('es-ES');
      return '<div class="session-row"><span>' + start + '</span><span>' + sess.message_count + ' msgs</span></div>';
    }).join('');

    return '<div class="student-card' + (isActive ? ' active-filter' : '') + '" onclick="setStudentFilter(' + s.id + ')">' +
      '<div class="student-header">' +
      '<span class="student-name">' + escapeHtml(s.name) + '</span>' +
      '<span class="student-level" style="background:' + color + '22;color:' + color + '">' + s.level + '</span>' +
      '</div>' +
      '<div class="student-stats">' +
      '<span>💬 ' + s.total_messages + ' msgs</span>' +
      '<span>📋 ' + s.total_sessions + ' sessions</span>' +
      '<span>🕐 ' + lastActive + '</span>' +
      '</div>' +
      '<span class="view-msgs">' + (isActive ? '✓ showing' : '→ view') + '</span>' +
      '<div class="student-detail' + (isActive ? ' open' : '') + '">' +
      '<div style="margin-bottom:8px;font-size:0.8rem;color:var(--text-dim)">Sessions:</div>' +
      (sessionDetails || '<div style="font-size:0.8rem;color:var(--text-dim)">No sessions yet</div>') +
      '</div>' +
      '</div>';
  }).join('');
  document.getElementById('student-list').innerHTML = studentsHtml;

  // ── Conversations ──
  var convFilters = [];
  if (activeLevel) {
    convFilters.push('<span class="filter-tag">Level: ' + activeLevel + '<span class="clear-x" onclick="setLevelFilter(\'' + activeLevel + '\')"> ✕</span></span>');
  }
  if (activeStudentId) {
    var sName = '';
    data.students.forEach(function(s) { if (s.id === activeStudentId) sName = s.name; });
    convFilters.push('<span class="filter-tag">Student: ' + escapeHtml(sName) + '<span class="clear-x" onclick="setStudentFilter(' + activeStudentId + ')"> ✕</span></span>');
  }
  if (activeLevel || activeStudentId) {
    convFilters.push('<span class="filter-tag" onclick="clearFilters()" style="background:rgba(255,107,107,0.15);color:var(--red)">Clear all ✕</span>');
  }
  document.getElementById('conv-filters').innerHTML = convFilters.join(' ');

  // Messages
  var messagesToShow = filtered ? filtered.messages : data.recent_messages;
  document.getElementById('conv-count').textContent = messagesToShow.length + ' messages';

  if (messagesToShow.length === 0) {
    document.getElementById('conv-list').innerHTML = '<div class="msg-empty">No messages to show</div>';
    return;
  }

  var msgsHtml = messagesToShow.map(function(m) {
    var roleClass = m.role === 'user' ? 'user-msg' : 'assistant-msg';
    var time = new Date(m.created_at + ' UTC').toLocaleString('es-ES');
    var content = escapeHtml(m.content);
    var truncated = content.length > 200;
    var studentLabel = m.student_name || 'Unknown';

    return '<div class="msg-item ' + roleClass + '">' +
      '<div class="msg-meta">' +
      '<span><strong>' + escapeHtml(studentLabel) + '</strong> · ' + m.role + '</span>' +
      '<span>' + time + '</span>' +
      '</div>' +
      '<div class="msg-content' + (truncated ? '' : ' expanded') + '">' + content + '</div>' +
      (truncated ? '<span class="msg-expand" onclick="toggleMsg(this)">Show more ▼</span>' : '') +
      '</div>';
  }).join('');
  document.getElementById('conv-list').innerHTML = msgsHtml;
}

function escapeHtml(str) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function toggleMsg(el) {
  var content = el.previousElementSibling;
  content.classList.toggle('expanded');
  el.textContent = content.classList.contains('expanded') ? 'Show less ▲' : 'Show more ▼';
}

// Enter key on password field
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('admin-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
});
</script>
